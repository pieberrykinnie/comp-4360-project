BASE: [""]

DATA:
  BATCH_SIZE: 4
  CSV_PATH: data/CheXpert-v1.0-small/train.csv
  IMG_ROOT: data
  IMG_SIZE: 224
  PIN_MEMORY: true
  NUM_WORKERS: 0
  MASK_PATCH_SIZE: 32
  MASK_RATIO: 0.6

MODEL:
  TYPE: vit
  NAME: simmim_pretrain
  DROP_RATE: 0.0
  DROP_PATH_RATE: 0.1
  VIT:
    PATCH_SIZE: 16
    IN_CHANS: 1
    EMBED_DIM: 768
    DEPTH: 12
    NUM_HEADS: 12
    MLP_RATIO: 4
    QKV_BIAS: true
    INIT_VALUES: 0.1
    USE_APE: false
    USE_RPB: false
    USE_SHARED_RPB: true
    USE_MEAN_POOLING: false

TRAIN:
  START_EPOCH: 0
  EPOCHS: 1
  WARMUP_EPOCHS: 1
  WEIGHT_DECAY: 0.05
  BASE_LR: 5.0e-4
  WARMUP_LR: 5.0e-7
  MIN_LR: 5.0e-6
  CLIP_GRAD: 5.0
  AUTO_RESUME: false
  ACCUMULATION_STEPS: 1
  USE_CHECKPOINT: false
  LR_SCHEDULER:
    NAME: cosine
  OPTIMIZER:
    NAME: adamw
    EPS: 1.0e-8
    BETAS: [0.9, 0.999]

AMP_OPT_LEVEL: "O0"
OUTPUT: output
TAG: smoke_test
SAVE_FREQ: 1
PRINT_FREQ: 1
SEED: 0
EVAL_MODE: false
THROUGHPUT_MODE: false
PRETRAINED: ""
