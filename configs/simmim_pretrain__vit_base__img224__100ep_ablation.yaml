MODEL:
  TYPE: vit
  NAME: simmim_pretrain
  DROP_PATH_RATE: 0.1
  VIT:
    PATCH_SIZE: 4
    EMBED_DIM: 768
    DEPTH: 12
    NUM_HEADS: 12
    USE_APE: False
    USE_RPB: False
    USE_SHARED_RPB: True
    USE_MEAN_POOLING: False
DATA:
  BATCH_SIZE: 116
  IMG_SIZE: 224
  MASK_PATCH_SIZE: 4
  MASK_RATIO: 0.6
  CSV_PATH: "data/CheXpert-v1.0-small/train.csv"
  IMG_ROOT: "data/"
TRAIN:
  EPOCHS: 100
  WARMUP_EPOCHS: 10
  BASE_LR: 0.0001
  WARMUP_LR: 0.0000005
  WEIGHT_DECAY: 0.05
  LR_SCHEDULER:
    NAME: 'multistep'
    GAMMA: 0.1
    MULTISTEPS: [700,]
AMP_OPT_LEVEL: "O1"
PRINT_FREQ: 100
SAVE_FREQ: 5
TAG: simmim_pretrain__vit_base__img224__100ep
